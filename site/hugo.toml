baseURL = "https://nplus.wiki/hugo-book-template/"
languageCode = 'zh'
title = "讀書筆記模版"
enableGitInfo = true

[[module.imports]]
path = "github.com/Andrewnplus/nplus-book-core"

[params]
BookSection = "docs"
BookTheme = "light"
BookLogo = "logo.png"
BookCollapseSection = true


[markup.highlight]
style = "nord"

[markup.goldmark.renderer]
unsafe = true

[markup.goldmark.parser]
attribute = true