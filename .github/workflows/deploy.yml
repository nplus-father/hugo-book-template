# Drop this file into a HugoBook repo as .github/workflows/deploy.yml.
# It replaces the whole 60-line per-repo deploy pipeline.

name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    uses: nplus-father/workflows/.github/workflows/hugobook-build-deploy.yml@v1
    permissions:
      # Default set covers deploy-mode=pages-artifact (the default).
      # If you override to deploy-mode=gh-pages-branch, change to:
      #   contents: write
      #   (drop pages/id-token since they're unused for branch deploy)
      contents: read
      pages: write
      id-token: write
    secrets: inherit
    # with:
    #   hugo-version: '0.155.0'
    #   deploy-mode: 'gh-pages-branch'
    #   run-spotless: false
